name: Release

# Tag-driven release. Push a tag like `v0.2.0` to build Rover.app on
# macOS, package it into Rover.dmg via package.sh, and attach the DMG
# to the matching GitHub Release.
#
# Two signing modes:
#   1. Secrets unset: build is ad-hoc signed (current default). The
#      uploaded DMG works but Gatekeeper requires a right-click → Open
#      on first launch.
#   2. Secrets set: full Developer ID signing + Apple notarization +
#      stapling. The DMG opens with a normal double-click on any Mac.
#
# Required secrets to enable mode 2 (all six must be present):
#   APPLE_DEVELOPER_ID_CERT_P12_BASE64   — base64 of the .p12 export
#                                          containing the cert + key
#   APPLE_DEVELOPER_ID_CERT_PASSWORD     — password used at .p12 export
#   APPLE_DEVELOPER_ID_IDENTITY          — codesign identity string,
#                                          e.g. "Developer ID Application:
#                                          Your Name (TEAMID)"
#   APPLE_NOTARY_API_KEY_P8_BASE64       — base64 of AuthKey_XXXXX.p8
#   APPLE_NOTARY_API_KEY_ID              — 10-char key ID
#   APPLE_NOTARY_API_ISSUER_ID           — issuer UUID
#
# See docs/SIGNING.md for how to obtain each value.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Define keychain + secret paths
        # `runner.temp` isn't available in job-level `env`, so we
        # propagate the paths via $GITHUB_ENV here. Subsequent steps
        # can then refer to them with plain shell expansion.
        run: |
          {
            echo "KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain"
            echo "CERT_PATH=$RUNNER_TEMP/cert.p12"
            echo "NOTARY_KEY_PATH=$RUNNER_TEMP/notary.p8"
          } >> "$GITHUB_ENV"

      - name: Resolve tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      # All six signing+notary secrets must be present, or we fall
      # through to the existing ad-hoc path. Single source of truth so
      # downstream steps can gate uniformly.
      - name: Detect signing secrets
        id: secrets
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}
          NOTARY_KEY: ${{ secrets.APPLE_NOTARY_API_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
        run: |
          if [[ -n "$CERT_BASE64" && -n "$CERT_PASSWORD" && -n "$IDENTITY" \
              && -n "$NOTARY_KEY" && -n "$NOTARY_KEY_ID" && -n "$NOTARY_ISSUER_ID" ]]; then
            echo "have_signing=true" >> "$GITHUB_OUTPUT"
            echo "→ all six signing secrets present"
          else
            echo "have_signing=false" >> "$GITHUB_OUTPUT"
            echo "→ at least one signing secret missing — falling back to ad-hoc build"
          fi

      - name: Import Developer ID certificate
        if: steps.secrets.outputs.have_signing == 'true'
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo -n "$CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Make the temp keychain the active one without nuking the
          # default user keychains the runner image already has. Word
          # splitting is intentional: `existing` is a list of paths.
          existing=$(security list-keychains -d user | tr -d '"')
          # shellcheck disable=SC2086
          security list-keychains -d user -s "$KEYCHAIN_PATH" $existing
          # Verify the identity is reachable via codesign.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Stage notary API key
        if: steps.secrets.outputs.have_signing == 'true'
        env:
          NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          echo -n "$NOTARY_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"

      - name: Build + sign + (notarize) Rover.dmg
        working-directory: RoverApp
        env:
          # Empty when secrets are missing — package.sh / build.sh treat
          # an empty CODESIGN_IDENTITY as "ad-hoc, no notary".
          CODESIGN_IDENTITY: ${{ steps.secrets.outputs.have_signing == 'true' && secrets.APPLE_DEVELOPER_ID_IDENTITY || '' }}
          NOTARY_KEY_PATH: ${{ steps.secrets.outputs.have_signing == 'true' && env.NOTARY_KEY_PATH || '' }}
          NOTARY_KEY_ID: ${{ steps.secrets.outputs.have_signing == 'true' && secrets.APPLE_NOTARY_API_KEY_ID || '' }}
          NOTARY_ISSUER_ID: ${{ steps.secrets.outputs.have_signing == 'true' && secrets.APPLE_NOTARY_API_ISSUER_ID || '' }}
        run: ./package.sh

      - name: Verify artifact
        working-directory: RoverApp
        run: |
          test -f Rover.dmg
          ls -lh Rover.dmg
          hdiutil verify Rover.dmg

      - name: Verify Gatekeeper acceptance
        if: steps.secrets.outputs.have_signing == 'true'
        working-directory: RoverApp
        run: |
          # Final user-visible check: this is what end users' machines
          # will run when they double-click the DMG. If this fails, the
          # release would still ship but Gatekeeper would reject it.
          spctl -a -t open --context context:primary-signature -v Rover.dmg
          codesign --verify --deep --strict --verbose=2 Rover.app

      - name: Cleanup keychain + secrets
        if: always() && steps.secrets.outputs.have_signing == 'true'
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$CERT_PATH" "$NOTARY_KEY_PATH"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "→ existing release for $TAG, replacing asset"
            gh release upload "$TAG" RoverApp/Rover.dmg --clobber
          else
            echo "→ creating release for $TAG"
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              RoverApp/Rover.dmg
          fi
